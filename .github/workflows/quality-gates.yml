name: quality-gates

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install project
        run: |
          uv venv --python 3.13 .venv
          uv pip install -p .venv/bin/python -e . --group dev

      - name: Ruff (style, imports, complexity)
        run: .venv/bin/ruff check apex tests

      - name: Mypy (strict typing)
        run: .venv/bin/mypy

      - name: Pytest (unit + integration)
        run: .venv/bin/pytest

      - name: Boot gate
        run: .venv/bin/python -m apex --check
