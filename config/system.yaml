# APEX system configuration - consumed by the kernel (Phase 0/1).
schema_version: 1

app_name: apex
environment: development   # development | testing | staging | production
run_mode: backtest         # backtest | paper | live | research

# Identity determinism (Constitution 3.24/3.27): with deterministic_ids
# enabled, all generated ids derive from id_seed and a run is replayable.
deterministic_ids: false
id_seed: null

events:
  journal_capacity: 10000  # retained events in the in-process journal
  fail_fast: false         # true: a failing event handler aborts the run

storage:
  data_dir: runtime        # SQLite databases live here (gitignored)

plugins:
  enabled:                 # loaded in order at boot (Book II 29.24)
    - apex.storage.plugin
    - apex.data.toobit.plugin
    - apex.features.plugin
    - apex.probability.plugin
