# Market data platform configuration - owned by Phase 3 (Data Platform).
schema_version: 1

symbols:
  - BTCUSDT
  - ETHUSDT
timeframes:
  - 1h
  - 4h
history_bars: 500          # bars to backfill per series when empty

quality:
  gap_penalty: 0.25          # quality deduction for a bar following a gap
  forming_bar_quality: 0.5   # score assigned to not-yet-closed bars

streaming:
  forming_flush_ms: 5000     # throttle for persisting forming-bar updates
  reconnect_backoff_ms: 2000 # linear backoff between reconnect attempts
  max_reconnects: 5          # reconnect budget per streaming session

features:
  structure:                   # AICE structure family (Book VI inputs)
    pivot_lookback: 8
    atr_length: 14
    displacement_body_atr: 1.2
    equal_tolerance_atr: 0.10
    break_decay: 0.985
    internal_lookback: 3       # int_piv_lb
    external_lookback: 21      # ext_piv_lb
    bias_ema_length: 50
  liquidity:                   # AICE liquidity family (Book VI inputs)
    chart_lookback: 8
    internal_lookback: 3
    external_lookback: 21
    atr_length: 14
    equal_tolerance_atr: 0.10
    liquidity_decay: 0.990
    ema_length: 50
  orderblocks:                 # AICE order block / FVG family (Book VI inputs)
    pivot_lookback: 8
    atr_length: 14
    displacement_body_atr: 1.2
    break_decay: 0.985
    scan_lookback: 150         # ob_lb
    scan_cap: 300              # ob_scan_cap
    ob_decay: 0.985
    fvg_decay: 0.975
    max_live_objects: 12
    max_object_age: 300
    min_fvg_size_atr: 0.05
    volume_sma_length: 20
    range_sma_length: 14
    zpf_fast_length: 12
    zpf_slow_length: 26
  volume:                      # AICE volume & normalization family (Book VI inputs)
    atr_length: 14
    volume_sma_length: 20
    range_sma_length: 14
    normalization_window: 200  # norm_win
    rank_window: 200           # rank_len
    forecast_length: 50        # vol_fc_len
    winsor_z: 3.0
    zpf_fast_length: 12
    zpf_slow_length: 26
    profile_length: 96         # vp_len
    profile_bins: 16           # vp_bins
    delta_roll_length: 50
    delta_bias_ema_length: 100
    htf_pivot_lookback: 8
    htf_ema_length: 50
  htf:                         # AICE macro context (Book VI lines 1087-1097)
    macro1_minutes: 60         # macro_tf1 = "60"
    macro2_minutes: 240        # macro_tf2 = "240"
    pivot_lookback: 8
    ema_length: 50
  smt:                         # AICE SMT core (Book VI SMT inputs)
    pivot_lookback: 5
    max_pivot_age: 10
    correlation_length: 120
    correlation_minimum: 0.60
    correlation_slope_length: 34
    decay_rate: 0.985
    min_score: 0.35
  statistical:                 # AICE regime / candle DNA / kinetic (Book VI inputs)
    atr_length: 14
    adx_length: 14
    adx_trend_threshold: 23.0
    efficiency_length: 20      # er_len
    entropy_window: 50         # hurst_len
    normalization_window: 200  # norm_win
    rank_window: 200           # rank_len (vol_factor)
    range_sma_length: 14
    wavetrend_channel: 10      # wt_ch
    wavetrend_average: 21      # wt_avg
    stc_cycle: 48
    stc_fast: 23
    stc_slow: 50
    cci_length: 20

probability:                   # AICE confluence calibration (Book VI lines 2769-2771)
  momentum_length: 10          # struct_mom EMA
  calibration_offset: 0.45
  calibration_gain_base: 5.4
  calibration_gain_slope: 1.2
  probability_floor: 0.01
  probability_ceiling: 0.99
  uncertainty_scale: 0.15      # APEX CI half-width vs estimate entropy

decision:                      # AICE execution inputs (Book VI gExec/gCluster)
  probability_threshold: 0.62
  probability_edge: 0.03
  uncertainty_maximum: 0.45
  minimum_contributors: 3
  cooldown_bars: 24
  rvol_cutoff: 1.5
  minimum_atr_percent: 0.01
  maximum_atr_percent: 5.0
  entropy_maximum: 0.78
  oracle_failure_maximum: 0.72
  minimum_expected_r: 0.10
  minimum_expected_edge_r: 0.03
  fee_slippage_r: 0.02
  stop_atr_multiple: 2.0       # sl_mult
  target_atr_multiple: 3.5     # tp_mult
  similarity_threshold: 0.88
  similarity_cooldown_bars: 60
  pending_maximum_bars: 12
  micro_bos_length: 3
  trigger_close_location: 0.62
  atr_length: 14
  ema_length: 20
  macro_pivot_lookback: 8
