# Market data platform configuration - owned by Phase 3 (Data Platform).
schema_version: 1

symbols:
  - BTCUSDT
  - ETHUSDT
timeframes:
  - 1h
  - 4h
history_bars: 500          # bars to backfill per series when empty

quality:
  gap_penalty: 0.25          # quality deduction for a bar following a gap
  forming_bar_quality: 0.5   # score assigned to not-yet-closed bars

streaming:
  forming_flush_ms: 5000     # throttle for persisting forming-bar updates
  reconnect_backoff_ms: 2000 # linear backoff between reconnect attempts
  max_reconnects: 5          # reconnect budget per streaming session

features:
  structure:                   # AICE structure family (Book VI inputs)
    pivot_lookback: 8
    atr_length: 14
    displacement_body_atr: 1.2
    equal_tolerance_atr: 0.10
    break_decay: 0.985
  liquidity:                   # AICE liquidity family (Book VI inputs)
    chart_lookback: 8
    internal_lookback: 3
    external_lookback: 21
    atr_length: 14
    equal_tolerance_atr: 0.10
    liquidity_decay: 0.990
    ema_length: 50
  orderblocks:                 # AICE order block / FVG family (Book VI inputs)
    pivot_lookback: 8
    atr_length: 14
    displacement_body_atr: 1.2
    break_decay: 0.985
    scan_lookback: 150         # ob_lb
    scan_cap: 300              # ob_scan_cap
    ob_decay: 0.985
    fvg_decay: 0.975
    max_live_objects: 12
    max_object_age: 300
    min_fvg_size_atr: 0.05
    volume_sma_length: 20
    range_sma_length: 14
    zpf_fast_length: 12
    zpf_slow_length: 26
  volume:                      # AICE volume & normalization family (Book VI inputs)
    atr_length: 14
    volume_sma_length: 20
    range_sma_length: 14
    normalization_window: 200  # norm_win
    rank_window: 200           # rank_len
    forecast_length: 50        # vol_fc_len
    winsor_z: 3.0
    zpf_fast_length: 12
    zpf_slow_length: 26
    profile_length: 96         # vp_len
    profile_bins: 16           # vp_bins
    delta_roll_length: 50
    delta_bias_ema_length: 100
    htf_pivot_lookback: 8
    htf_ema_length: 50
  htf:                         # AICE macro context (Book VI lines 1087-1097)
    macro1_minutes: 60         # macro_tf1 = "60"
    macro2_minutes: 240        # macro_tf2 = "240"
    pivot_lookback: 8
    ema_length: 50
  smt:                         # AICE SMT core (Book VI SMT inputs)
    pivot_lookback: 5
    max_pivot_age: 10
    correlation_length: 120
    correlation_minimum: 0.60
    correlation_slope_length: 34
    decay_rate: 0.985
    min_score: 0.35
