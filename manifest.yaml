# APEX Repository Manifest (Book II 3.39)
# Central coordination record: project version, module versions, dependency
# graph, registries and schema versions. Updated at the end of every phase.

manifest_version: 1
project:
  name: apex
  version: 0.3.0
  phase: 4            # next phase to build
  phases_complete: [0, 1, 2, 3]

config_schema_version: 1
contract_schema_version: 1
database_schema_version: 1      # bars + kv_store + event archive (SQLite)

modules:
  apex.core:      { version: 0.3.0, stability: beta,         owner: foundation }
  apex.domain:    { version: 0.1.0, stability: beta,         owner: foundation }
  apex.contracts: { version: 0.3.0, stability: beta,         owner: foundation }
  apex.kernel:    { version: 0.3.0, stability: beta,         owner: foundation }
  apex.storage:   { version: 0.2.0, stability: beta,         owner: data-platform }
  apex.plugins:   { version: 0.1.0, stability: beta,         owner: foundation }
  apex.data:      { version: 0.2.0, stability: beta,         owner: data-platform }

# Downward-only dependency edges between built packages (Book II 3.25).
dependency_graph:
  apex.domain: [apex.core]
  apex.contracts: [apex.core, apex.domain]
  apex.kernel: [apex.core, apex.plugins]
  apex.plugins: [apex.core, apex.kernel]
  apex.storage: [apex.core, apex.domain, apex.plugins]
  apex.data: [apex.core, apex.domain, apex.contracts, apex.storage, apex.plugins]

# Populated by their phases.
plugin_registry:
  - { name: storage_core, kind: service, version: 0.1.0, module: apex.storage.plugin }
  - { name: toobit_connector, kind: exchange_connector, version: 0.1.0, module: apex.data.toobit.plugin }
feature_registry: []
exchange_registry:
  - { id: toobit, market_data: true, trading: false }

quality_gates:
  ruff: clean
  mypy_strict: clean
  tests_passed: 214
  boot_check: pass
  live_smoke: REST sync (400 bars) + 25s WS stream (225 ticks) validated
